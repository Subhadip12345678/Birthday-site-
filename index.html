<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday 🎉</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    text-align: center;
    color: white;
}

/* Container */
.container {
    margin-top: 80px;
}

/* Heading */
h1 {
    font-size: 50px;
    animation: float 2s infinite ease-in-out;
}

/* Image */
.photo {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    border: 5px solid white;
    margin: 20px;
}

/* Message */
.message {
    font-size: 20px;
}

/* Button */
button {
    padding: 12px 25px;
    font-size: 18px;
    border: none;
    border-radius: 25px;
    background: white;
    color: #ff4b7d;
    cursor: pointer;
}

/* Surprise text */
#surprise {
    display: none;
    font-size: 24px;
    margin-top: 20px;
}

/* Animation */
@keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

/* Confetti */
.confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    top: 0;
    animation: fall linear forwards;
}

@keyframes fall {
    to {
        transform: translateY(100vh) rotate(360deg);
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>🎉 Happy Birthday 🎉</h1>

    <!-- Your Photo -->
    <img src="myphoto.jpg" class="photo">

    <p class="message">
        Wishing you happiness, success and lots of love ❤️
    </p>

    <!-- Play Music Button -->
    <button onclick="playMusic()">Play Music 🎵</button>

    <br><br>

    <!-- Surprise Button -->
    <button onclick="showSurprise()">Click for Surprise 🎁</button>

    <!-- Hidden Message -->
    <div id="surprise">
        🎂 You are amazing! Stay blessed always 💖 🎂
    </div>
</div>

<!-- Audio -->
<audio id="music">
    <source src="birthday.mp3" type="audio/mpeg">
</audio>

<script>
function playMusic() {
    document.getElementById("music").play();
}

function showSurprise() {
    document.getElementById("surprise").style.display = "block";
    startConfetti();
}

function startConfetti() {
    for (let i = 0; i < 100; i++) {
        let confetti = document.createElement("div");
        confetti.classList.add("confetti");

        confetti.style.left = Math.random() * 100 + "vw";
        confetti.style.backgroundColor =
            "hsl(" + Math.random() * 360 + ", 100%, 50%)";
        confetti.style.animationDuration =
            (Math.random() * 3 + 2) + "s";

        document.body.appendChild(confetti);

        setTimeout(function() {
            confetti.remove();
        }, 5000);
    }
}
</script>

</body>
</html>
