<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday 🎉</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    text-align: center;
    color: white;
    overflow-x: hidden;
}

/* Container */
.container {
    margin-top: 80px;
    animation: fadeIn 2s ease-in;
}

/* Heading animation */
h1 {
    font-size: 50px;
    animation: float 2s infinite ease-in-out;
}

/* Image styling */
.photo {
    width: 220px;
    height: 220px;
    border-radius: 50%;
    border: 6px solid white;
    margin: 20px;
    transition: transform 0.5s;
}

.photo:hover {
    transform: scale(1.1) rotate(5deg);
}

/* Message */
.message {
    font-size: 22px;
    margin: 20px;
}

/* Button */
button {
    padding: 12px 25px;
    font-size: 18px;
    border: none;
    border-radius: 25px;
    background: white;
    color: #ff4b7d;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #ff4b7d;
    color: white;
}

/* Hidden surprise */
#surprise {
    display: none;
    margin-top: 20px;
    font-size: 24px;
    animation: fadeIn 2s;
}

/* Animations */
@keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

/* Confetti */
.confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    background: white;
    top: 0;
    animation: fall linear forwards;
}

@keyframes fall {
    to {
        transform: translateY(100vh) rotate(360deg);
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>🎉 Happy Birthday! 🎉</h1>

    <!-- Replace with your image -->
    <img src="myphoto.jpg" class="photo">

    <p class="message">
        Wishing you happiness, success, and lots of love ❤️
    </p>

    <button onclick="showSurprise()">Click for Surprise 🎁</button>

    <div id="surprise">
        🎂 You are amazing! Stay blessed always 💖 🎂
    </div>
</div>

<!-- Music -->
<audio id="music" autoplay loop>
    <source src="birthday.mp3" type="audio/mpeg">
</audio>

<script>
function showSurprise() {
    document.getElementById("surprise").style.display = "block";
    startConfetti();
}

/* Confetti effect */
<script>
function startConfetti() {
    for (let i = 0; i < 100; i++) {

        let confetti = document.createElement("div");

        confetti.classList.add("confetti");

        confetti.style.left = Math.random() * 100 + "vw";
        confetti.style.backgroundColor =
            "hsl(" + Math.random() * 360 + ", 100%, 50%)";
        confetti.style.animationDuration =
            (Math.random() * 3 + 2) + "s";

        document.body.appendChild(confetti);

        setTimeout(function() {
            confetti.remove();
        }, 5000);
    }
}
</script>
<button onclick="document.getElementById('music').play()">
Play Music 🎵
</button>

<audio id="music">
  <source src="birthday.mp3" type="audio/mpeg">
</audio>
